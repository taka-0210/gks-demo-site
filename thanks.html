<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | GKSチェーン協会</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Yu Gothic","YuGothic","Noto Sans JP",sans-serif;
      background:#f7f8fa;
      color:#333;
    }

    .thanks{
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:30px;
    }

    .thanks-box{

      max-width:700px;
      width:100%;

      background:#fff;

      padding:60px;

      border-radius:16px;

      text-align:center;

      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }

    .thanks-box h1{
      color:#0F2D63;
      font-size:40px;
      margin-bottom:20px;
    }

    .thanks-box p{
      font-size:18px;
      line-height:1.8;
      margin-bottom:15px;
    }

    .home-btn{

      display:inline-block;

      margin-top:30px;

      background:#0F2D63;

      color:#fff;

      padding:14px 36px;

      border-radius:6px;

      text-decoration:none;

      transition:.3s;
    }

    .home-btn:hover{
      background:#1E4EA8;
      transform:translateY(-3px);
    }

.thanks-logo{
    width:300px;
    height:auto;

    margin:0 auto 30px;
}

  </style>

</head>
<body>

<section class="thanks">

  <div class="thanks-box">
    <img src="image/logo/logo.png" alt="GKSチェーン協会" class="thanks-logo">

    <h1>送信ありがとうございました</h1>

    <p>
      お問い合わせ内容を受け付けました。
    </p>

    <p>
      内容を確認のうえ、
      担当者よりご連絡させていただきます。
    </p>

    <a href="index.html" class="home-btn">
      トップページへ戻る
    </a>

  </div>

</section>

</body>
</html>
